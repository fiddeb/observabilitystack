# Grafana configuration  
# Unified visualization dashboard

grafana:
  fullnameOverride: grafana
  global:
    imageRegistry: null
    imagePullSecrets: []
  rbac:
    create: true
    pspEnabled: false
    pspUseAppArmor: false
    namespaced: true

  serviceAccount:
    create: true
    name:
    nameTest:
    labels: {}
    automountServiceAccountToken: false

  replicas: 1

  headlessService: false

  automountServiceAccountToken: true

  autoscaling:
    enabled: false

  deploymentStrategy:
    type: RollingUpdate

  readinessProbe:
    httpGet:
      path: /api/health
      port: 3000

  livenessProbe:
    httpGet:
      path: /api/health
      port: 3000
    initialDelaySeconds: 60
    timeoutSeconds: 30
    failureThreshold: 10

  image:
    registry: docker.io
    repository: grafana/grafana
    pullPolicy: IfNotPresent
  
  testFramework:
    enabled: false
    
  securityContext:
    runAsNonRoot: true
    runAsUser: 472
    runAsGroup: 472
    fsGroup: 472

  containerSecurityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
      - ALL
    seccompProfile:
      type: RuntimeDefault
  createConfigmap: true

  extraLabels: {}

  downloadDashboardsImage:
    registry: docker.io
    repository: curlimages/curl
    tag: 7.85.0
    sha: ""
    pullPolicy: IfNotPresent

  downloadDashboards:
    env: {}
    envFromSecret: ""
    resources: {}
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
        - ALL
      seccompProfile:
        type: RuntimeDefault
    envValueFrom: {}

  podPortName: grafana
  gossipPortName: gossip

  service:
    enabled: true
    type: ClusterIP
    port: 80
    targetPort: 3000
    annotations: {}
    labels: {}
    portName: service
    appProtocol: ""

  ingress:
    enabled: true
    ingressClassName: traefik
    annotations: {}
    labels: {}
    path: /
    pathType: Prefix
    hosts:
      - grafana.k8s.test
    backend:
      service:
        name: grafana
        port:
          number: 80

  serviceMonitor:
    enabled: false
    path: /metrics
    labels: {}
    interval: 30s
    scheme: http
    tlsConfig: {}
    scrapeTimeout: 30s
    relabelings: []
    metricRelabelings: []
    targetLabels: []

  extraExposePorts: []
  resources: {}

  persistence:
    type: pvc
    enabled: false
    accessModes:
      - ReadWriteOnce
    size: 1Gi
    finalizers:
      - kubernetes.io/pvc-protection
    extraPvcLabels: {}
    disableWarning: false

  adminUser: admin
  # Fixed password prevents Helm from generating a new randAlphaNum on every render,
  # which would change the Secret checksum annotation and trigger unnecessary pod restarts.
  # Login is disabled via auth.anonymous, so this value is never used in practice.
  adminPassword: "observability-stack-admin"

  plugins: []

  # Datasources provisioneras via ett villkorat ConfigMap (ett per komponent
  # som är enabled i base.yaml). Se templates/grafana-datasources.yaml.
  # Monteras direkt som volym — ingen sidecar eller init-container behövs.
  datasources: {}

  extraConfigmapMounts:
    - name: grafana-provisioned-datasources
      mountPath: /etc/grafana/provisioning/datasources
      configMap: grafana-provisioned-datasources
      readOnly: true

  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"

  alerting: {}
  notifiers: {}
  dashboardProviders: {}
  dashboards: {}

  dashboardsConfigMaps: {}

  grafana.ini:
    paths:
      data: /var/lib/grafana/
      logs: /var/log/grafana
      plugins: /var/lib/grafana/plugins
      provisioning: /etc/grafana/provisioning
    analytics:
      check_for_updates: true
    log:
      mode: console
    auth:
      disable_login: true
    auth.anonymous:
      enabled: true
      org_role: "Admin"
    grafana_net:
      url: https://grafana.net
    server:
      domain: "{{ if (and .Values.ingress.enabled .Values.ingress.hosts) }}{{ tpl (.Values.ingress.hosts | first) . }}{{ else }}''{{ end }}"
    profile:
      enabled: false
    feature_toggles:
      alertingTriage: true
      # Explicitly disabled
      ProfileFeatureTogglePage: false

      # Kept from previous config (still experimental/off by default)
      dashboardTemplates: true
      newSavedQueriesExperience: true
      queryLibrary: true
      alertingMigrationUI: true
      alertingImportYAMLUI: true

      # === NEW in 13.0.2 — Dashboards ===
      dashboardAssistantPopover: true       # AI-popover on panel click in view mode
      dashboardFiltersOverview: true        # Filters overview pane
      dashboardSectionVariables: true       # Variables at row/tab level
      sceneCsvExport: true                  # CSV export via scenes architecture
      annotationsClustering: true           # Annotation clustering

      # === NEW in 13.0.2 — Alerting ===
      alertingRuleGroupSortByFolderFullpath: true  # Sort rule groups by folder path
      createAlertRuleFromPanel: true               # Create alert from panel via drawer
      alertingAlertListPanelEnhancements: true     # Enhanced stat mode in Alert List panel
      alertingSavedSearches: true                  # Saved searches for alert rules

      # === NEW in 13.0.2 — Visualization ===
      enableDatagridEditing: true           # Edit functionality in datagrid panel
      newGauge: true                        # New gauge visualization
      yAxisTickControl: true                # Fine-grained Y-axis tick options
      tabularNumbers: true                  # Fixed-width numbers globally in UI
      enableColorblindSafePanelOptions: true  # Colorblind-safe palette + line patterns

      # === NEW in 13.0.2 — Logs / Tracing / Profiling ===
      inlineLogDetailsNoScrolls: true       # Inline log details without extra scroll
      lokiAlignedQuerySplitting: true       # Align Loki query splits at UTC midnight
      flameGraphWithCallTree: true          # Call Tree view in Flame Graph
      tracesDrilldownTimeSeeker: true       # Time seeker in traces drilldown

      # === NEW in 13.0.2 — Queries & Caching ===
      queryCacheRequestDeduplication: true  # Deduplicate in-flight cached queries
      sseExpressionErrorIsolation: true     # Isolate SSE expression errors per refID

      # === NEW in 13.0.2 — Provisioning ===
      provisioningExport: true              # Export provisioned resources
  ldap:
    enabled: false
    existingSecret: ""
    config: ""

  revisionHistoryLimit: 10
