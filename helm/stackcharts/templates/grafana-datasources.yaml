{{/*
  Ett samlat ConfigMap med en fil per aktiverad komponent.
  Monteras direkt i /etc/grafana/provisioning/datasources via
  grafana.extraConfigmapMounts — ingen sidecar eller init-container.
  Varje nyckel renderas bara om komponenten är enabled i base.yaml.
*/}}
{{- if .Values.grafana.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-provisioned-datasources
  namespace: {{ .Release.Namespace }}
data:
  {{- if .Values.prometheus.enabled }}
  prometheus.yaml: |
    apiVersion: 1
    datasources:
    - name: Prometheus
      type: prometheus
      uid: prometheus
      url: http://prometheus
      isDefault: true
      editable: true
  {{- end }}
  {{- if .Values.mimir.enabled }}
  mimir.yaml: |
    apiVersion: 1
    datasources:
    - name: Mimir
      type: prometheus
      uid: mimir
      url: http://mimir-gateway/prometheus
      isDefault: false
      editable: true
      jsonData:
        httpMethod: POST
        manageAlerts: false
        prometheusType: Mimir
  {{- end }}
  {{- if .Values.loki.enabled }}
  loki.yaml: |
    apiVersion: 1
    datasources:
    - name: loki
      type: loki
      uid: loki
      url: http://loki-gateway
      isDefault: false
      editable: true
      jsonData:
        httpHeaderName1: "X-Scope-OrgID"
      secureJsonData:
        httpHeaderValue1: "foo"
    - name: loki-bazz
      type: loki
      uid: loki-bazz
      url: http://loki-gateway
      isDefault: false
      editable: true
      jsonData:
        httpHeaderName1: "X-Scope-OrgID"
      secureJsonData:
        httpHeaderValue1: "bazz"
  {{- end }}
  {{- if .Values.tempo.enabled }}
  tempo.yaml: |
    apiVersion: 1
    datasources:
    - name: Tempo
      type: tempo
      uid: tempo
      url: http://tempo:3200
      isDefault: false
      editable: true
      jsonData:
        tracesToLogsV2:
          customQuery: true
          datasourceUid: 'loki'
          query: '{$${__tags}} | trace_id = "$${__trace.traceId}"'
          tags:
            - key: 'service.name'
              value: 'service_name'
        serviceMap:
          datasourceUid: 'prometheus'
        tracesToMetrics:
          datasourceUid: 'prometheus'
  {{- end }}
{{- end }}
